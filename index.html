<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenwirtschaft</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📦</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ece9e6 0%, #ffffff 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
            padding: 40px 20px; transition: background 0.4s;
        }
        body.dark-mode { background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%); }
        .container {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.12);
            padding: 32px 28px; width: 100%; max-width: 900px;
            border: 1px solid rgba(255,255,255,0.6); transition: background 0.4s, box-shadow 0.4s;
        }
        body.dark-mode .container { background: rgba(38,38,60,0.9); border-color: rgba(255,255,255,0.08); box-shadow: 0 25px 60px rgba(0,0,0,0.5); color: #eee; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        body.dark-mode .header h1 { background: linear-gradient(135deg, #9b8cf2, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header-buttons { display: flex; gap: 12px; }
        .btn {
            padding: 10px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 14px;
            background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.08); color: #444;
            transition: all 0.25s; backdrop-filter: blur(6px); white-space: nowrap;
        }
        .btn:hover { background: rgba(255,255,255,0.95); box-shadow: 0 8px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .btn:active { transform: scale(0.96); box-shadow: none; }
        body.dark-mode .btn { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); color: #ddd; }
        body.dark-mode .btn:hover { background: rgba(255,255,255,0.18); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #5a6fd6, #6a4190); box-shadow: 0 12px 28px rgba(102,126,234,0.35); }
        .btn-danger { border-color: #ff8a80; color: #e53935; }
        .btn-danger:hover { background: #ff8a80; color: white; border-color: transparent; }
        body.dark-mode .btn-danger { border-color: #ff8a80; color: #ff8a80; }
        body.dark-mode .btn-danger:hover { background: #ff8a80; color: #1e1e2f; }
        .auth-box { background: rgba(248,249,255,0.8); backdrop-filter: blur(12px); border-radius: 20px; padding: 24px; margin-bottom: 28px; border: 1px solid rgba(0,0,0,0.04); }
        body.dark-mode .auth-box { background: rgba(60,60,90,0.7); border-color: rgba(255,255,255,0.08); }
        .auth-box input {
            width: 100%; padding: 14px 16px; margin: 10px 0; border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px; font-size: 16px; font-family: inherit; background: rgba(255,255,255,0.8);
        }
        body.dark-mode .auth-box input { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); color: #eee; }
        .auth-box input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.15); }
        .auth-buttons { display: flex; gap: 14px; margin-top: 18px; }
        .auth-btn {
            flex: 1; padding: 14px; border: none; border-radius: 16px; font-size: 16px;
            font-weight: 700; cursor: pointer; transition: all 0.25s;
        }
        .login-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .register-btn { background: rgba(0,0,0,0.05); color: #444; }
        body.dark-mode .register-btn { background: rgba(255,255,255,0.08); color: #ddd; }
        .auth-message { text-align: center; margin-top: 12px; font-size: 14px; min-height: 22px; }
        .error { color: #e74c3c; } .success { color: #4CAF50; }
        .hidden { display: none !important; }
        input, select, textarea {
            width: 100%; padding: 14px 16px; margin: 8px 0; border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px; font-size: 15px; font-family: inherit; background: rgba(255,255,255,0.8);
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); color: #eee; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.15); }
        .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .nav-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 18px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.7); }
        .nav-btn.active { background: #667eea; color: white; border-color: transparent; }
        body.dark-mode .nav-btn.active { background: #9b8cf2; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.06); text-align: left; font-size: 14px; }
        th { font-weight: 600; color: #555; }
        body.dark-mode th { color: #ccc; }
        body.dark-mode td { color: #ddd; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-low { background: rgba(255,138,128,0.2); color: #e53935; }
        .badge-ok { background: rgba(76,175,80,0.15); color: #2e7d32; }
        .import-btn { background: transparent; border: 2px solid #1976d2; color: #1976d2; }
        body.dark-mode .import-btn { border-color: #64b5f6; color: #64b5f6; }
        .import-btn:hover { background: rgba(25,118,210,0.1); }
        .bestell-btn { background: transparent; border: 2px solid #f57c00; color: #f57c00; }
        body.dark-mode .bestell-btn { border-color: #ffb74d; color: #ffb74d; }
        .bestell-btn:hover { background: rgba(245,124,0,0.1); }
        .druck-btn { background: transparent; border: 2px solid #999; color: #666; }
        body.dark-mode .druck-btn { color: #aaa; border-color: #aaa; }
        .druck-btn:hover { background: #eee; }
        .kritisch-btn { background: transparent; border: 2px solid #e53935; color: #e53935; }
        body.dark-mode .kritisch-btn { border-color: #ff8a80; color: #ff8a80; }
        .kritisch-btn:hover { background: rgba(255,138,128,0.15); }
        .kritisch-btn.aktiv { background: #e53935; color: white; }
        body.dark-mode .kritisch-btn.aktiv { background: #ff8a80; color: #1e1e2f; }
        .csv-btn { background: transparent; border: 2px solid #2e7d32; color: #2e7d32; }
        body.dark-mode .csv-btn { border-color: #66bb6a; color: #66bb6a; }
        .csv-btn:hover { background: rgba(76,175,80,0.1); }

        .import-status, .bestell-status { margin-top: 8px; font-size: 13px; }

        /* Druck-Stile */
        @media print {
            body { background: white !important; padding: 0; margin: 0; }
            .container { box-shadow: none; border: none; padding: 20px; backdrop-filter: none; background: white !important; max-width: 100%; }
            .header-buttons, .btn, .nav-bar, .auth-box, .hidden, .neue-liste-form, .neuer-artikel-form, .back-btn, .faellig-badge, .druck-btn, .kritisch-btn, .csv-btn, .import-btn, .bestell-btn,
            .modal-overlay, .tabs, .manage-kat-btn, .logout-btn, .dark-mode-btn, .password-btn, .edit-btn, .auswahl-checkbox,
            .artikel-actions, .liste-actions, .modal, .close-modal, .btn-danger, .btn-selection, .btn-aktivitaeten,
            .bulk-bar, .sort-row label, select, .buchenFormular, .artikelFormular, .kategorieFormular, .lieferantFormular, .einladenFormular, .import-status, .bestell-status, .bestell-export-btn {
                display: none !important;
            }
            .artikel-item, .liste-row { border-bottom: 1px solid #ccc; padding: 8px 0; }
            .artikel-text, .artikel-menge, .artikel-preis { color: black !important; font-size: 14px; }
            h1, h2, h3 { color: black !important; -webkit-text-fill-color: black !important; background: none !important; }
            table { border-collapse: collapse; width: 100%; }
            th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 24px 16px; border-radius: 22px; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📦 Warenwirtschaft</h1>
        <div class="header-buttons">
            <button id="darkModeToggle" class="btn" onclick="toggleDarkMode()">🌙</button>
            <button id="logoutBtn" class="btn btn-danger hidden" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="authBox" class="auth-box">
        <input type="email" id="authEmail" placeholder="E-Mail">
        <input type="password" id="authPassword" placeholder="Passwort">
        <div class="auth-buttons">
            <button class="auth-btn login-btn" onclick="login()">Anmelden</button>
            <button class="auth-btn register-btn" onclick="register()">Registrieren</button>
        </div>
        <div id="authMessage" class="auth-message"></div>
    </div>

    <div id="appContent" class="hidden">
        <div class="nav-bar">
            <button class="nav-btn active" data-view="artikel" onclick="switchView('artikel')">📋 Artikel</button>
            <button class="nav-btn" data-view="buchungen" onclick="switchView('buchungen')">📜 Buchungen</button>
            <button class="nav-btn" data-view="kategorien" onclick="switchView('kategorien')">📂 Kategorien</button>
            <button class="nav-btn" data-view="lieferanten" onclick="switchView('lieferanten')">🚚 Lieferanten</button>
            <button class="nav-btn" data-view="team" onclick="switchView('team')">👥 Team</button>
        </div>

        <!-- Artikel-View -->
        <div id="viewArtikel">
            <div class="row" style="margin-bottom:20px;">
                <select id="filterKategorie" onchange="loadArtikel()">
                    <option value="">Alle Kategorien</option>
                </select>
                <button id="btnKritisch" class="btn kritisch-btn" onclick="toggleKritischerFilter()">⚠️ Kritische</button>
                <button class="btn csv-btn" onclick="exportiereCSV()">📥 CSV Export</button>
                <button class="btn import-btn" onclick="document.getElementById('importFileInput').click()">📤 CSV Import</button>
                <input type="file" id="importFileInput" accept=".csv" class="hidden" onchange="importCSV(event)">
                <button class="btn bestell-btn" onclick="ladeBestellvorschlag()">📋 Bestellvorschlag</button>
                <button class="btn btn-primary" onclick="openArtikelFormular()">➕ Neuer Artikel</button>
                <button class="btn druck-btn" onclick="window.print()">🖨️ Drucken</button>
            </div>
            <div id="importStatus" class="import-status"></div>
            <div id="bestellStatus" class="bestell-status"></div>

            <!-- Normale Artikeltabelle -->
            <div id="artikelTabelle"></div>

            <!-- Bestellvorschlag (initial ausgeblendet) -->
            <div id="bestellvorschlagContainer" class="hidden">
                <div class="row" style="margin-bottom:15px;">
                    <button class="btn" onclick="zeigeArtikelTabelle()">⬅ Zurück zur Artikelliste</button>
                    <button class="btn csv-btn bestell-export-btn" onclick="exportiereBestellvorschlagCSV()">📥 CSV Export</button>
                </div>
                <div id="bestellvorschlagTabelle"></div>
            </div>

            <div id="artikelFormular" class="hidden" style="background:rgba(248,249,255,0.8); padding:24px; border-radius:20px; margin-top:20px;">
                <h3 id="artikelFormTitel">Neuen Artikel anlegen</h3>
                <input type="hidden" id="editArtikelId">
                <input type="text" id="artikelName" placeholder="Artikelname">
                <select id="artikelKategorie">
                    <option value="">Kategorie wählen</option>
                </select>
                <select id="artikelLieferant">
                    <option value="">Lieferant wählen</option>
                </select>
                <input type="number" id="artikelPreis" placeholder="Preis (€)" step="0.01" min="0">
                <input type="number" id="artikelMindestbestand" placeholder="Mindestbestand" min="0">
                <div class="row">
                    <button class="btn btn-primary" onclick="saveArtikel()">Speichern</button>
                    <button class="btn" onclick="cancelArtikelForm()">Abbrechen</button>
                </div>
            </div>
        </div>

        <!-- Buchungen-View -->
        <div id="viewBuchungen" class="hidden">
            <div class="row" style="margin-bottom:20px;">
                <select id="filterBuchungArtikel" onchange="loadBuchungen()">
                    <option value="">Alle Artikel</option>
                </select>
                <button class="btn btn-primary" onclick="openBuchenFormular()">➕ Buchung</button>
            </div>
            <div id="buchungenTabelle"></div>

            <div id="buchenFormular" class="hidden" style="background:rgba(248,249,255,0.8); padding:24px; border-radius:20px; margin-top:20px;">
                <h3>Wareneingang / -ausgang buchen</h3>
                <select id="buchenArtikelId">
                    <option value="">Artikel wählen</option>
                </select>
                <select id="buchenTyp">
                    <option value="eingang">Wareneingang (+)</option>
                    <option value="ausgang">Warenausgang (−)</option>
                </select>
                <input type="number" id="buchenMenge" placeholder="Menge" min="1">
                <input type="text" id="buchenGrund" placeholder="Grund (optional)">
                <div class="row">
                    <button class="btn btn-primary" onclick="doBuchung()">Buchen</button>
                    <button class="btn" onclick="cancelBuchenForm()">Abbrechen</button>
                </div>
            </div>
        </div>

        <!-- Kategorien-View -->
        <div id="viewKategorien" class="hidden">
            <div class="row" style="margin-bottom:20px;">
                <button class="btn btn-primary" onclick="openKategorieFormular()">➕ Neue Kategorie</button>
            </div>
            <div id="kategorienTabelle"></div>

            <div id="kategorieFormular" class="hidden" style="background:rgba(248,249,255,0.8); padding:24px; border-radius:20px; margin-top:20px;">
                <h3 id="kategorieFormTitel">Neue Kategorie anlegen</h3>
                <input type="hidden" id="editKategorieId">
                <input type="text" id="kategorieName" placeholder="Kategorie-Name">
                <div class="row">
                    <button class="btn btn-primary" onclick="saveKategorie()">Speichern</button>
                    <button class="btn" onclick="cancelKategorieForm()">Abbrechen</button>
                </div>
            </div>
        </div>

        <!-- Lieferanten-View -->
        <div id="viewLieferanten" class="hidden">
            <div class="row" style="margin-bottom:20px;">
                <button class="btn btn-primary" onclick="openLieferantFormular()">➕ Neuer Lieferant</button>
            </div>
            <div id="lieferantenTabelle"></div>

            <div id="lieferantFormular" class="hidden" style="background:rgba(248,249,255,0.8); padding:24px; border-radius:20px; margin-top:20px;">
                <h3 id="lieferantFormTitel">Neuen Lieferanten anlegen</h3>
                <input type="hidden" id="editLieferantId">
                <input type="text" id="lieferantName" placeholder="Lieferantenname">
                <input type="text" id="lieferantKontakt" placeholder="Kontakt (optional)">
                <div class="row">
                    <button class="btn btn-primary" onclick="saveLieferant()">Speichern</button>
                    <button class="btn" onclick="cancelLieferantForm()">Abbrechen</button>
                </div>
            </div>
        </div>

        <!-- Team-View -->
        <div id="viewTeam" class="hidden">
            <h3>Team-Mitglieder</h3>
            <div id="teamTabelle"></div>
            <div style="margin-top:20px;">
                <button class="btn btn-primary" onclick="toggleEinladen()">➕ Mitglied einladen</button>
                <div id="einladenFormular" class="hidden" style="margin-top:15px; background:rgba(248,249,255,0.8); padding:20px; border-radius:16px;">
                    <input type="email" id="einladenEmail" placeholder="E-Mail des Benutzers">
                    <select id="einladenRolle">
                        <option value="user">Benutzer</option>
                        <option value="lagerist">Lagerist</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button class="btn btn-primary" onclick="einladen()">Einladen</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API = 'https://warenwirtschaft-api.elber3763.workers.dev/api';
let userRolle = 'user';
let activeView = 'artikel';
let kritischerFilterAktiv = false;
let kategorienCache = [];
let lieferantenCache = [];
let artikelCache = [];
let bestellvorschlagCache = [];

async function apiCall(url, options = {}) {
    const token = localStorage.getItem('token');
    if (token) { options.headers = options.headers || {}; options.headers['Authorization'] = 'Bearer ' + token; }
    return fetch(API + url, options);
}

function initDarkMode() {
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeToggle').textContent = '☀️';
    }
}
function toggleDarkMode() {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
}

window.onload = () => { initDarkMode(); if (localStorage.getItem('token')) nachLogin(); };

async function register() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const msg = document.getElementById('authMessage');
    if (!email || !password) { msg.textContent = 'Bitte ausfüllen.'; msg.className = 'error'; return; }
    try {
        const resp = await fetch(API + '/register', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
        });
        if (resp.ok) { msg.textContent = 'Registrierung erfolgreich.'; msg.className = 'success'; }
        else if (resp.status === 409) { msg.textContent = 'E-Mail bereits registriert.'; msg.className = 'error'; }
    } catch { msg.textContent = 'Server nicht erreichbar.'; msg.className = 'error'; }
}

async function login() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const msg = document.getElementById('authMessage');
    if (!email || !password) { msg.textContent = 'Bitte ausfüllen.'; msg.className = 'error'; return; }
    try {
        const resp = await fetch(API + '/login', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
        });
        if (resp.ok) {
            const data = await resp.json();
            localStorage.setItem('token', data.token);
            userRolle = data.rolle;
            nachLogin();
        } else { msg.textContent = 'Ungültige Anmeldedaten.'; msg.className = 'error'; }
    } catch { msg.textContent = 'Server nicht erreichbar.'; msg.className = 'error'; }
}

function nachLogin() {
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    document.getElementById('appContent').classList.remove('hidden');
    loadKategorien();
    loadLieferanten();
    switchView('artikel');
}
function logout() { localStorage.clear(); location.reload(); }

function switchView(view) {
    activeView = view;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-view="${view}"]`).classList.add('active');
    document.getElementById('viewArtikel').classList.add('hidden');
    document.getElementById('viewBuchungen').classList.add('hidden');
    document.getElementById('viewKategorien').classList.add('hidden');
    document.getElementById('viewLieferanten').classList.add('hidden');
    document.getElementById('viewTeam').classList.add('hidden');
    if (view === 'artikel') { document.getElementById('viewArtikel').classList.remove('hidden'); zeigeArtikelTabelle(); }
    else if (view === 'buchungen') { document.getElementById('viewBuchungen').classList.remove('hidden'); loadBuchungen(); }
    else if (view === 'kategorien') { document.getElementById('viewKategorien').classList.remove('hidden'); loadKategorienView(); }
    else if (view === 'lieferanten') { document.getElementById('viewLieferanten').classList.remove('hidden'); loadLieferantenView(); }
    else if (view === 'team') { document.getElementById('viewTeam').classList.remove('hidden'); loadTeam(); }
}

function toggleKritischerFilter() {
    kritischerFilterAktiv = !kritischerFilterAktiv;
    const btn = document.getElementById('btnKritisch');
    if (kritischerFilterAktiv) {
        btn.classList.add('aktiv');
        btn.textContent = '⚠️ Kritische (aktiv)';
    } else {
        btn.classList.remove('aktiv');
        btn.textContent = '⚠️ Kritische';
    }
    loadArtikel();
}

function exportiereCSV() {
    if (artikelCache.length === 0) {
        alert('Keine Artikel zum Exportieren vorhanden.');
        return;
    }
    const header = ['Name', 'Kategorie', 'Preis', 'Bestand', 'Mindestbestand'];
    const rows = artikelCache.map(a => [
        a.name,
        a.kategorie_name || '',
        a.preis ? a.preis.toFixed(2).replace('.', ',') : '',
        a.bestand || 0,
        a.mindestbestand || 0
    ]);
    let csv = header.join(';') + '\n';
    rows.forEach(r => csv += r.join(';') + '\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'artikel_export.csv'; a.click();
    URL.revokeObjectURL(url);
}

function exportiereBestellvorschlagCSV() {
    if (bestellvorschlagCache.length === 0) {
        alert('Kein Bestellvorschlag geladen.');
        return;
    }
    const header = ['Name', 'Bestand', 'Mindestbestand', 'Nachbestellen', 'Lieferant'];
    const rows = bestellvorschlagCache.map(b => [
        b.name,
        b.bestand || 0,
        b.mindestbestand,
        b.nachbestellen,
        b.lieferant_name || ''
    ]);
    let csv = header.join(';') + '\n';
    rows.forEach(r => csv += r.join(';') + '\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'bestellvorschlag.csv'; a.click();
    URL.revokeObjectURL(url);
}

async function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const statusDiv = document.getElementById('importStatus');
    statusDiv.textContent = 'Importiere...';
    statusDiv.className = 'import-status';
    try {
        const resp = await apiCall('/artikel/import', {
            method: 'POST',
            headers: { 'Content-Type': 'text/csv' },
            body: file
        });
        const result = await resp.json();
        if (resp.ok) {
            statusDiv.textContent = `✅ ${result.importiert} von ${result.gesamt} Artikeln importiert.`;
            statusDiv.className = 'import-status success';
            loadArtikel();
        } else {
            statusDiv.textContent = '❌ Fehler: ' + (result.error || 'Unbekannter Fehler');
            statusDiv.className = 'import-status error';
        }
    } catch (e) {
        statusDiv.textContent = '❌ Netzwerkfehler beim Import.';
        statusDiv.className = 'import-status error';
    }
    event.target.value = '';
}

// ---------- Bestellvorschlag ----------
async function ladeBestellvorschlag() {
    const statusDiv = document.getElementById('bestellStatus');
    statusDiv.textContent = 'Lade Bestellvorschlag...';
    statusDiv.className = 'bestell-status';
    try {
        const resp = await apiCall('/artikel/bestellvorschlag');
        if (resp.ok) {
            bestellvorschlagCache = await resp.json();
            zeigeBestellvorschlag();
            statusDiv.textContent = '';
        } else {
            statusDiv.textContent = '❌ Fehler beim Laden.';
            statusDiv.className = 'bestell-status error';
        }
    } catch {
        statusDiv.textContent = '❌ Netzwerkfehler.';
        statusDiv.className = 'bestell-status error';
    }
}

function zeigeBestellvorschlag() {
    document.getElementById('artikelTabelle').classList.add('hidden');
    document.getElementById('bestellvorschlagContainer').classList.remove('hidden');
    const container = document.getElementById('bestellvorschlagTabelle');
    if (bestellvorschlagCache.length === 0) {
        container.innerHTML = '<p>Keine kritischen Artikel vorhanden.</p>';
        return;
    }
    let html = '<table><thead><tr><th>Name</th><th>Bestand</th><th>Mindest.</th><th>Nachbestellen</th><th>Lieferant</th></tr></thead><tbody>';
    bestellvorschlagCache.forEach(b => {
        html += `<tr>
            <td>${b.name}</td><td>${b.bestand || 0}</td><td>${b.mindestbestand}</td>
            <td><strong>${b.nachbestellen}</strong></td><td>${b.lieferant_name || '–'}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

function zeigeArtikelTabelle() {
    document.getElementById('bestellvorschlagContainer').classList.add('hidden');
    document.getElementById('artikelTabelle').classList.remove('hidden');
    loadArtikel();
}

// ---------- Kategorien ----------
async function loadKategorien() {
    try { const r = await apiCall('/kategorien'); if (r.ok) kategorienCache = await r.json(); } catch {}
    populateKatSelects();
}
function populateKatSelects() {
    const selects = ['filterKategorie','artikelKategorie','filterBuchungArtikel','buchenArtikelId'];
    selects.forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        sel.innerHTML = id.includes('Buchung') || id.includes('buchen') ? '<option value="">Alle Artikel</option>' : '<option value="">Alle Kategorien</option>';
        kategorienCache.forEach(k => { const o = document.createElement('option'); o.value = k.id; o.textContent = k.name; sel.appendChild(o); });
    });
}

function loadKategorienView() {
    const container = document.getElementById('kategorienTabelle');
    if (kategorienCache.length === 0) { container.innerHTML = '<p>Keine Kategorien vorhanden.</p>'; return; }
    let html = '<table><thead><tr><th>Name</th><th></th></tr></thead><tbody>';
    kategorienCache.forEach(k => {
        html += `<tr>
            <td>${k.name}</td>
            <td>
                <button class="btn" onclick="openKategorieFormular(${k.id})">✏️</button>
                ${userRolle === 'admin' ? `<button class="btn btn-danger" onclick="deleteKategorie(${k.id})">🗑️</button>` : ''}
            </td>
        </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

function openKategorieFormular(id = null) {
    if (id) {
        const kat = kategorienCache.find(k => k.id === id);
        if (!kat) return;
        document.getElementById('kategorieFormTitel').textContent = 'Kategorie bearbeiten';
        document.getElementById('editKategorieId').value = kat.id;
        document.getElementById('kategorieName').value = kat.name;
    } else {
        document.getElementById('kategorieFormTitel').textContent = 'Neue Kategorie anlegen';
        document.getElementById('editKategorieId').value = '';
        document.getElementById('kategorieName').value = '';
    }
    document.getElementById('kategorieFormular').classList.remove('hidden');
}
function cancelKategorieForm() { document.getElementById('kategorieFormular').classList.add('hidden'); }

async function saveKategorie() {
    const id = document.getElementById('editKategorieId').value;
    const name = document.getElementById('kategorieName').value.trim();
    if (!name) return alert('Name erforderlich');
    try {
        const r = id
            ? await apiCall('/kategorien/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) })
            : await apiCall('/kategorien', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
        if (r.ok) { cancelKategorieForm(); loadKategorien(); loadKategorienView(); }
    } catch { alert('Fehler'); }
}

async function deleteKategorie(id) {
    if (!confirm('Kategorie löschen?')) return;
    try { await apiCall('/kategorien/' + id, { method: 'DELETE' }); loadKategorien(); loadKategorienView(); } catch { alert('Fehler'); }
}

// ---------- Artikel ----------
async function loadArtikel() {
    const kat = document.getElementById('filterKategorie').value;
    let url = '/artikel';
    const params = [];
    if (kat) params.push(`kategorie=${kat}`);
    if (kritischerFilterAktiv) params.push('kritisch=true');
    if (params.length > 0) url += '?' + params.join('&');
    try {
        const r = await apiCall(url);
        if (r.ok) {
            artikelCache = await r.json();
            renderArtikelTabelle(artikelCache);
        }
    } catch {}
}
function renderArtikelTabelle(liste) {
    const container = document.getElementById('artikelTabelle');
    if (liste.length === 0) { container.innerHTML = '<p>Keine Artikel gefunden.</p>'; return; }
    let html = '<table><thead><tr><th>Name</th><th>Kategorie</th><th>Preis</th><th>Bestand</th><th>Mindest.</th><th></th></tr></thead><tbody>';
    liste.forEach(a => {
        const bestandKlasse = a.bestand < a.mindestbestand ? 'badge-low' : 'badge-ok';
        html += `<tr>
            <td>${a.name}</td><td>${a.kategorie_name || '–'}</td><td>${a.preis ? a.preis.toFixed(2)+' €' : '–'}</td>
            <td><span class="badge ${bestandKlasse}">${a.bestand || 0}</span></td>
            <td>${a.mindestbestand || 0}</td>
            <td>
                <button class="btn" onclick="editArtikel(${a.id})">✏️</button>
                ${userRolle === 'admin' ? `<button class="btn btn-danger" onclick="deleteArtikel(${a.id})">🗑️</button>` : ''}
            </td>
        </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}
function openArtikelFormular() {
    document.getElementById('artikelFormTitel').textContent = 'Neuen Artikel anlegen';
    document.getElementById('editArtikelId').value = '';
    document.getElementById('artikelName').value = '';
    document.getElementById('artikelPreis').value = '';
    document.getElementById('artikelMindestbestand').value = '';
    document.getElementById('artikelKategorie').value = '';
    document.getElementById('artikelLieferant').value = '';
    document.getElementById('artikelFormular').classList.remove('hidden');
}
function cancelArtikelForm() { document.getElementById('artikelFormular').classList.add('hidden'); }
async function saveArtikel() {
    const id = document.getElementById('editArtikelId').value;
    const body = {
        name: document.getElementById('artikelName').value.trim(),
        kategorie_id: document.getElementById('artikelKategorie').value || null,
        preis: document.getElementById('artikelPreis').value ? parseFloat(document.getElementById('artikelPreis').value) : null,
        mindestbestand: document.getElementById('artikelMindestbestand').value || 0
    };
    if (!body.name) return alert('Name erforderlich');
    try {
        const r = id
            ? await apiCall('/artikel/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
            : await apiCall('/artikel', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (r.ok) { cancelArtikelForm(); loadArtikel(); }
    } catch { alert('Fehler'); }
}
function editArtikel(id) {
    const a = artikelCache.find(x => x.id === id);
    if (!a) return;
    document.getElementById('artikelFormTitel').textContent = 'Artikel bearbeiten';
    document.getElementById('editArtikelId').value = a.id;
    document.getElementById('artikelName').value = a.name;
    document.getElementById('artikelPreis').value = a.preis || '';
    document.getElementById('artikelMindestbestand').value = a.mindestbestand || 0;
    document.getElementById('artikelKategorie').value = a.kategorie_id || '';
    document.getElementById('artikelLieferant').value = a.lieferant_id || '';
    document.getElementById('artikelFormular').classList.remove('hidden');
}
async function deleteArtikel(id) {
    if (!confirm('Artikel löschen?')) return;
    try { await apiCall('/artikel/' + id, { method: 'DELETE' }); loadArtikel(); } catch { alert('Fehler'); }
}

// ---------- Buchungen ----------
async function loadBuchungen() {
    const artId = document.getElementById('filterBuchungArtikel').value;
    try {
        const r = await apiCall('/buchungen' + (artId ? `?artikel_id=${artId}` : ''));
        if (r.ok) {
            const buchungen = await r.json();
            let html = '<table><thead><tr><th>Zeitpunkt</th><th>Artikel</th><th>Typ</th><th>Menge</th><th>Grund</th><th>Benutzer</th></tr></thead><tbody>';
            buchungen.forEach(b => {
                html += `<tr>
                    <td>${new Date(b.zeitpunkt).toLocaleString('de-DE')}</td><td>${b.artikel_name}</td>
                    <td>${b.typ === 'eingang' ? '➕ Eingang' : '➖ Ausgang'}</td>
                    <td>${b.menge}</td><td>${b.grund || '–'}</td><td>${b.user_email}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('buchungenTabelle').innerHTML = buchungen.length === 0 ? '<p>Keine Buchungen.</p>' : html;
        }
    } catch {}
}
function openBuchenFormular() { document.getElementById('buchenFormular').classList.remove('hidden'); }
function cancelBuchenForm() { document.getElementById('buchenFormular').classList.add('hidden'); }
async function doBuchung() {
    const body = {
        artikel_id: document.getElementById('buchenArtikelId').value,
        typ: document.getElementById('buchenTyp').value,
        menge: parseInt(document.getElementById('buchenMenge').value),
        grund: document.getElementById('buchenGrund').value.trim()
    };
    if (!body.artikel_id || !body.menge) return alert('Artikel und Menge erforderlich');
    try {
        const r = await apiCall('/buchungen', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (r.ok) { cancelBuchenForm(); loadBuchungen(); loadArtikel(); }
        else { const msg = await r.text(); alert(msg); }
    } catch { alert('Fehler'); }
}

// ---------- Team ----------
async function loadTeam() {
    try {
        const r = await apiCall('/team');
        if (r.ok) {
            const mitglieder = await r.json();
            let html = '<table><thead><tr><th>E-Mail</th><th>Rolle</th><th>Beigetreten</th></tr></thead><tbody>';
            mitglieder.forEach(m => { html += `<tr><td>${m.email}</td><td>${m.rolle}</td><td>${new Date(m.joined_at).toLocaleDateString('de-DE')}</td></tr>`; });
            html += '</tbody></table>';
            document.getElementById('teamTabelle').innerHTML = html;
        }
    } catch {}
}
function toggleEinladen() { document.getElementById('einladenFormular').classList.toggle('hidden'); }
async function einladen() {
    const email = document.getElementById('einladenEmail').value.trim();
    const rolle = document.getElementById('einladenRolle').value;
    if (!email) return alert('E-Mail eingeben');
    try {
        const r = await apiCall('/team/einladen', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, rolle}) });
        if (r.ok) { loadTeam(); toggleEinladen(); alert('Benutzer eingeladen.'); }
        else { const msg = await r.text(); alert(msg); }
    } catch { alert('Fehler'); }
}
